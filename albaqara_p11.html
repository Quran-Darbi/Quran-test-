<script>
const EASY_Q=[
  {q:"«قَالُوا ادْعُ لَنَا رَبَّكَ يُبَيِّن لَّنَا مَا هِىَ إِنَّ الْبَقَرَ تَشَـٰبَهَ عَلَيْنَا وَإِنَّآ إِن شَآءَ اللَّهُ _____»",choices:["لَمُهْتَدُونَ","لَمُؤْمِنُونَ","لَصَادِقُونَ"],answer:0},
  {q:"«قَالَ إِنَّهُۥ يَقُولُ إِنَّهَا بَقَرَةٌ لَّا ذَلُولٌ تُثِيرُ الْأَرْضَ وَلَا تَسْقِى الْحَرْثَ مُسَلَّمَةٌ لَّا شِيَةَ فِيهَا قَالُوا الْـَٔـٰنَ جِئْتَ بِالْحَقِّ فَذَبَحُوهَا وَمَا كَادُوا _____»",choices:["يَفْعَلُونَ","يَذْبَحُونَ","يَقْبَلُونَ"],answer:0},
  {q:"«وَإِذْ قَتَلْتُمْ نَفْسًا فَادَّٰرَءْتُمْ فِيهَا وَاللَّهُ مُخْرِجٌ مَّا كُنتُمْ _____»",choices:["تَكْتُمُونَ","تُخْفُونَ","تَفْعَلُونَ"],answer:0},
  {q:"«فَقُلْنَا اضْرِبُوهُ بِبَعْضِهَا كَذَٰلِكَ يُحْىِ اللَّهُ الْمَوْتَىٰ وَيُرِيكُمْ ءَايَـٰتِهِۦ لَعَلَّكُمْ _____»",choices:["تَعْقِلُونَ","تَفْقَهُونَ","تَعْلَمُونَ"],answer:0},
  {q:"«ثُمَّ قَسَتْ قُلُوبُكُم مِّن بَعْدِ ذَٰلِكَ فَهِىَ كَالْحِجَارَةِ أَوْ أَشَدُّ _____»",choices:["قَسْوَةً","صَلَابَةً","شِدَّةً"],answer:0},
  {q:"«وَإِنَّ مِنَ الْحِجَارَةِ لَمَا يَتَفَجَّرُ مِنْهُ الْأَنْهَـٰرُ وَإِنَّ مِنْهَا لَمَا يَشَّقَّقُ فَيَخْرُجُ مِنْهُ الْمَآءُ وَإِنَّ مِنْهَا لَمَا يَهْبِطُ مِنْ خَشْيَةِ _____»",choices:["اللَّهِ","الرَّحْمَـٰنِ","رَبِّهِ"],answer:0},
  {q:"«أَفَتَطْمَعُونَ أَن يُؤْمِنُوا لَكُمْ وَقَدْ كَانَ فَرِيقٌ مِّنْهُمْ يَسْمَعُونَ كَلَـٰمَ اللَّهِ ثُمَّ يُحَرِّفُونَهُۥ مِنۢ بَعْدِ مَا عَقَلُوهُ وَهُمْ _____»",choices:["يَعْلَمُونَ","يَفْقَهُونَ","يَفْعَلُونَ"],answer:0},
  {q:"«وَإِذَا لَقُوا الَّذِينَ ءَامَنُوا قَالُوٓا _____»",choices:["ءَامَنَّا","صَدَّقْنَا","أَسْلَمْنَا"],answer:0},
  {q:"«وَإِذَا خَلَا بَعْضُهُمْ إِلَىٰ بَعْضٍ قَالُوٓا أَتُحَدِّثُونَهُم بِمَا فَتَحَ اللَّهُ عَلَيْكُمْ _____»",choices:["لِيُحَآجُّوكُم بِهِۦ عِندَ رَبِّكُمْ","لِيُجَادِلُوكُم بِهِۦ","لِيُخَاصِمُوكُم بِهِۦ"],answer:0},
  {q:"«قَالُوٓا أَتُحَدِّثُونَهُم بِمَا فَتَحَ اللَّهُ عَلَيْكُمْ لِيُحَآجُّوكُم بِهِۦ عِندَ رَبِّكُمْ أَفَلَا _____»",choices:["تَعْقِلُونَ","تَفْقَهُونَ","تَعْلَمُونَ"],answer:0}
];
const MEDIUM_Q=[
  {q:"«قَالُوا ادْعُ لَنَا رَبَّكَ يُبَيِّن لَّنَا مَا هِىَ إِنَّ الْبَقَرَ تَشَـٰبَهَ عَلَيْنَا وَإِنَّآ إِن شَآءَ اللَّهُ _____»",answer:"لَمُهْتَدُونَ"},
  {q:"«قَالَ إِنَّهُۥ يَقُولُ إِنَّهَا بَقَرَةٌ لَّا ذَلُولٌ تُثِيرُ الْأَرْضَ وَلَا تَسْقِى الْحَرْثَ مُسَلَّمَةٌ لَّا شِيَةَ _____»",answer:"فِيهَا"},
  {q:"«قَالُوا الْـَٔـٰنَ جِئْتَ بِالْحَقِّ فَذَبَحُوهَا وَمَا كَادُوا _____»",answer:"يَفْعَلُونَ"},
  {q:"«وَإِذْ قَتَلْتُمْ نَفْسًا فَادَّٰرَءْتُمْ فِيهَا وَاللَّهُ مُخْرِجٌ مَّا كُنتُمْ _____»",answer:"تَكْتُمُونَ"},
  {q:"«فَقُلْنَا اضْرِبُوهُ بِبَعْضِهَا كَذَٰلِكَ يُحْىِ اللَّهُ الْمَوْتَىٰ وَيُرِيكُمْ ءَايَـٰتِهِۦ لَعَلَّكُمْ _____»",answer:"تَعْقِلُونَ"},
  {q:"«ثُمَّ قَسَتْ قُلُوبُكُم مِّن بَعْدِ ذَٰلِكَ فَهِىَ كَالْحِجَارَةِ أَوْ أَشَدُّ _____»",answer:"قَسْوَةً"},
  {q:"«وَإِنَّ مِنْهَا لَمَا يَهْبِطُ مِنْ خَشْيَةِ _____»",answer:"اللَّهِ"},
  {q:"«وَقَدْ كَانَ فَرِيقٌ مِّنْهُمْ يَسْمَعُونَ كَلَـٰمَ اللَّهِ ثُمَّ يُحَرِّفُونَهُۥ مِنۢ بَعْدِ مَا عَقَلُوهُ وَهُمْ _____»",answer:"يَعْلَمُونَ"},
  {q:"«وَإِذَا خَلَا بَعْضُهُمْ إِلَىٰ بَعْضٍ قَالُوٓا أَتُحَدِّثُونَهُم بِمَا فَتَحَ اللَّهُ عَلَيْكُمْ لِيُحَآجُّوكُم بِهِۦ عِندَ رَبِّكُمْ أَفَلَا _____»",answer:"تَعْقِلُونَ"},
  {q:"«وَإِذَا لَقُوا الَّذِينَ ءَامَنُوا قَالُوٓا _____»",answer:"ءَامَنَّا"}
];
const HARD_Q=[
  {q:"اكتب الآية السبعين من سورة البقرة كاملة",answer:"قَالُوا ادْعُ لَنَا رَبَّكَ يُبَيِّن لَّنَا مَا هِىَ إِنَّ الْبَقَرَ تَشَـٰبَهَ عَلَيْنَا وَإِنَّآ إِن شَآءَ اللَّهُ لَمُهْتَدُونَ"},
  {q:"اكتب الآية الحادية والسبعين من سورة البقرة كاملة",answer:"قَالَ إِنَّهُۥ يَقُولُ إِنَّهَا بَقَرَةٌ لَّا ذَلُولٌ تُثِيرُ الْأَرْضَ وَلَا تَسْقِى الْحَرْثَ مُسَلَّمَةٌ لَّا شِيَةَ فِيهَا قَالُوا الْـَٔـٰنَ جِئْتَ بِالْحَقِّ فَذَبَحُوهَا وَمَا كَادُوا يَفْعَلُونَ"},
  {q:"اكتب الآية الرابعة والسبعين من سورة البقرة كاملة",answer:"ثُمَّ قَسَتْ قُلُوبُكُم مِّن بَعْدِ ذَٰلِكَ فَهِىَ كَالْحِجَارَةِ أَوْ أَشَدُّ قَسْوَةً وَإِنَّ مِنَ الْحِجَارَةِ لَمَا يَتَفَجَّرُ مِنْهُ الْأَنْهَـٰرُ وَإِنَّ مِنْهَا لَمَا يَشَّقَّقُ فَيَخْرُجُ مِنْهُ الْمَآءُ وَإِنَّ مِنْهَا لَمَا يَهْبِطُ مِنْ خَشْيَةِ اللَّهِ وَمَا اللَّهُ بِغَـٰفِلٍ عَمَّا تَعْمَلُونَ"},
  {q:"اكتب الآية السادسة والسبعين من سورة البقرة كاملة",answer:"وَإِذَا لَقُوا الَّذِينَ ءَامَنُوا قَالُوٓا ءَامَنَّا وَإِذَا خَلَا بَعْضُهُمْ إِلَىٰ بَعْضٍ قَالُوٓا أَتُحَدِّثُونَهُم بِمَا فَتَحَ اللَّهُ عَلَيْكُمْ لِيُحَآجُّوكُم بِهِۦ عِندَ رَبِّكُمْ أَفَلَا تَعْقِلُونَ"},
  {q:"اكتب الآية الثانية والسبعين من سورة البقرة كاملة",answer:"وَإِذْ قَتَلْتُمْ نَفْسًا فَادَّٰرَءْتُمْ فِيهَا وَاللَّهُ مُخْرِجٌ مَّا كُنتُمْ تَكْتُمُونَ"}
];
let currentLevel=null,questions=[],qIndex=0,correctCount=0,wrongCount=0;
function toArabicNum(n){return n.toString().replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);}
function selectLevel(lvl){currentLevel=lvl;document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));document.getElementById('btn-'+lvl).classList.add('active');document.getElementById('start-btn').classList.add('ready');const t={easy:'١٠',medium:'١٠',hard:'٥'};document.getElementById('total-q').textContent=t[lvl];}
function updateBadges(){document.getElementById('qnum-badge').innerHTML=`السؤال ${toArabicNum(qIndex+1)} /<br>${toArabicNum(questions.length)}`;document.getElementById('wrong-badge').innerHTML=`${toArabicNum(wrongCount)} ✗<br>خطأ`;document.getElementById('correct-badge').innerHTML=`${toArabicNum(correctCount)} ✓<br>صحيح`;}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function startQuiz(){if(!currentLevel)return;if(currentLevel==='easy')questions=[...EASY_Q];if(currentLevel==='medium')questions=[...MEDIUM_Q];if(currentLevel==='hard')questions=[...HARD_Q];qIndex=correctCount=wrongCount=0;document.getElementById('level-card').style.display='none';document.getElementById('quiz-area').style.display='block';showQuestion();}
function showQuestion(){const q=questions[qIndex];updateBadges();document.getElementById('progress-fill').style.width=((qIndex)/questions.length*100)+'%';document.getElementById('q-number').textContent=`السؤال ${toArabicNum(qIndex+1)} من ${toArabicNum(questions.length)}`;document.getElementById('q-text').textContent=q.q;document.getElementById('feedback').style.display='none';document.getElementById('next-btn').style.display='none';document.getElementById('skip-btn').style.display='block';const zone=document.getElementById('answer-zone');zone.innerHTML='';if(currentLevel==='easy'){const div=document.createElement('div');div.className='choices';shuffle(q.choices.map((c,i)=>({text:c,idx:i}))).forEach(opt=>{const btn=document.createElement('button');btn.className='choice-btn';btn.textContent=opt.text;btn.onclick=()=>checkMCQ(opt.idx,q.answer,btn);div.appendChild(btn);});zone.appendChild(div);}else{const ta=document.createElement('textarea');ta.className='answer-input';ta.id='user-input';ta.placeholder=currentLevel==='medium'?'اكتب الكلمة الناقصة...':'اكتب الآية كاملة...';zone.appendChild(ta);const sub=document.createElement('button');sub.className='submit-btn';sub.textContent='تحقق ✓';sub.onclick=()=>checkText(q);zone.appendChild(sub);}}
function normalize(str){return str.replace(/[\u064B-\u065F\u0670]/g,'').replace(/[أإآا]/g,'ا').replace(/ة/g,'ه').replace(/ى/g,'ي').replace(/\s+/g,' ').trim();}
function checkMCQ(chosen,correct,btn){document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);const fb=document.getElementById('feedback');if(chosen===correct){btn.classList.add('correct');correctCount++;fb.className='feedback correct';fb.textContent='✓ أحسنت!';}else{btn.classList.add('wrong');wrongCount++;document.querySelectorAll('.choice-btn').forEach(b=>{if(b.textContent===questions[qIndex].choices[correct])b.classList.add('correct');});fb.className='feedback wrong';fb.textContent=`✗ الإجابة الصحيحة: ${questions[qIndex].choices[correct]}`;}fb.style.display='block';updateBadges();document.getElementById('next-btn').style.display='block';document.getElementById('skip-btn').style.display='none';}
function checkText(q){const input=document.getElementById('user-input');const userVal=input.value.trim();if(!userVal)return;input.disabled=true;document.querySelector('.submit-btn').disabled=true;const fb=document.getElementById('feedback');if(normalize(userVal)===normalize(q.answer)){correctCount++;fb.className='feedback correct';fb.innerHTML='✓ أحسنت! إجابة صحيحة تماماً';}else{wrongCount++;fb.className='feedback wrong';fb.innerHTML=`✗ الإجابة الصحيحة:<br><span style="font-size:18px;line-height:2">${q.answer}</span>`;}fb.style.display='block';updateBadges();document.getElementById('next-btn').style.display='block';document.getElementById('skip-btn').style.display='none';}
function skipQuestion(){const q=questions[qIndex];const fb=document.getElementById('feedback');if(currentLevel==='easy'){document.querySelectorAll('.choice-btn').forEach(b=>{b.disabled=true;if(b.textContent===q.choices[q.answer])b.classList.add('correct');});fb.className='feedback wrong';fb.innerHTML=`⬅ الإجابة الصحيحة: ${q.choices[q.answer]}`;}else{if(document.getElementById('user-input'))document.getElementById('user-input').disabled=true;const sub=document.querySelector('.submit-btn');if(sub)sub.disabled=true;fb.className='feedback wrong';fb.innerHTML=`⬅ الإجابة الصحيحة:<br><span style="font-size:18px;line-height:2">${q.answer}</span>`;}wrongCount++;fb.style.display='block';updateBadges();document.getElementById('skip-btn').style.display='none';document.getElementById('next-btn').style.display='block';}
function nextQuestion(){qIndex++;if(qIndex>=questions.length)showResult();else showQuestion();}
function showResult(){document.getElementById('quiz-area').style.display='none';document.getElementById('result-area').style.display='block';const pct=Math.round((correctCount/questions.length)*100);document.getElementById('result-score').textContent=`${toArabicNum(correctCount)} / ${toArabicNum(questions.length)} — ${toArabicNum(pct)}%`;let icon,title,msg;if(pct===100){icon='🌟';title='ممتاز! حفظ مثالي';msg='ما شاء الله! أتقنت الصفحة بالكامل';}else if(pct>=80){icon='✨';title='أحسنت!';msg='نتيجة رائعة، استمر في المراجعة';}else if(pct>=60){icon='📖';title='جيد';msg='راجع الصفحة مرة أخرى وأعد الاختبار';}else{icon='🌱';title='تحتاج مراجعة';msg='لا تيأس، المراجعة المستمرة هي المفتاح';}document.getElementById('result-icon').textContent=icon;document.getElementById('result-title').textContent=title;document.getElementById('result-msg').textContent=msg;document.getElementById('progress-fill').style.width='100%';updateBadges();}
function retryQuiz(){document.getElementById('result-area').style.display='none';document.getElementById('level-card').style.display='block';currentLevel=null;document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));document.getElementById('start-btn').classList.remove('ready');document.getElementById('total-q').textContent='١٠';document.getElementById('wrong-badge').innerHTML='٠ ✗<br>خطأ';document.getElementById('correct-badge').innerHTML='٠ ✓<br>صحيح';document.getElementById('qnum-badge').innerHTML='السؤال ١ /<br>١٠';document.getElementById('progress-fill').style.width='0%';}
</script>
</body>
</html>
